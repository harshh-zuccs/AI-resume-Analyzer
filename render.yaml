services:
  - type: web
    name: ai-resume-analyzer-api
    runtime: python
    rootDir: src
    buildCommand: "pip install -r ../requirements.txt && python -m spacy download en_core_web_sm"
    startCommand: "uvicorn api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0